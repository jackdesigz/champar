<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="game-logic.js"></script>

    <style>
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
      #scene-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

      #version { position: absolute; top: 10px; right: 10px; color: white; font-family: sans-serif; font-weight: bold; font-size: 16px; z-index: 99999; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); pointer-events: none; }
      
      #score-display {
        position: absolute; top: 10px; left: 50%; transform: translateX(-50%); z-index: 99999;
        color: #D4AF37; font-family: sans-serif; font-weight: bold; font-size: 24px;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.9); pointer-events: none;
      }

      #btn-switch-mode { 
        position: absolute; top: 10px; left: 10px; z-index: 99999; 
        background: rgba(0, 0, 0, 0.7); color: white; border: 2px solid #D4AF37; 
        padding: 8px 15px; border-radius: 10px; font-weight: bold; font-family: sans-serif;
        cursor: pointer; display: none; 
      }

      #btn-restart { 
        position: absolute; top: 40px; right: 10px; z-index: 99999; 
        background: rgba(230, 0, 0, 0.7); color: white; border: 2px solid #D4AF37; 
        padding: 8px 15px; border-radius: 10px; font-weight: bold; font-family: sans-serif; cursor: pointer; 
      }
      #btn-restart:active { background: rgba(230, 0, 0, 1); }

      #pc-instructions {
        position: absolute; top: 20px; left: 20px; z-index: 99999;
        background: rgba(0, 0, 0, 0.8); color: white; border: 2px solid #D4AF37;
        padding: 15px; border-radius: 10px; font-family: sans-serif; display: none; 
      }
      #pc-instructions h3 { margin: 0 0 10px 0; color: #D4AF37; font-size: 18px; }
      #pc-instructions p { margin: 5px 0; font-size: 14px; }

      #ui { position: absolute; bottom: 20px; width: 100%; z-index: 99999; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; pointer-events: none; }
      .btn { background: rgba(200, 0, 0, 0.6); border: 2px solid white; color: white; border-radius: 50%; pointer-events: auto; touch-action: none; font-weight: bold; font-size: 20px; user-select: none; }
      .dpad { display: grid; grid-template-columns: 50px 50px 50px; grid-template-rows: 50px 50px; gap: 5px; }
      .dpad .btn { width: 50px; height: 50px; }
      
      .game-screen {
        position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
        background: rgba(0, 0, 0, 0.9); border: 4px solid #D4AF37; 
        color: white; padding: 30px; text-align: center; font-family: sans-serif; border-radius: 15px; z-index: 99999; width: 80%; max-width: 400px;
      }
      .game-screen h1 { margin: 0; color: #e60000; font-size: 24px; text-transform: uppercase; }
      .game-screen p { font-size: 16px; margin-top: 10px; }
      .action-btn { margin-top:20px; padding:10px 20px; background:white; color:black; border:none; font-weight:bold; cursor: pointer; border-radius: 5px; font-size: 18px;}
      
      #win-screen { display: none; }
      #start-screen { display: block; }

      #flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: red; opacity: 0; pointer-events: none; z-index: 99998; transition: opacity 0.2s; }
    </style>
  </head>

  <body>
    <div id="version">ver.021</div>
    <div id="flash"></div>
    
    <div id="score-display">PUNTI: 0</div>

    <button id="btn-switch-mode"></button>
    <button id="btn-restart">RESTART</button>

    <div id="pc-instructions">
      <h3>Comandi Tastiera</h3>
      <p><b>Frecce / WASD:</b> Muoviti e sali le scale</p>
      <p><b>Barra Spaziatrice:</b> Salta</p>
    </div>

    <div id="start-screen" class="game-screen">
      <h1>CHAMP-AR</h1>
      <p>Evita le arance e raccogli la bottiglia di Campari in cima!</p>
      <button id="btn-start" class="action-btn">INIZIA A GIOCARE</button>
    </div>

    <div id="win-screen" class="game-screen">
      <h1>Campari Recuperato!</h1>
      <p id="final-score">Punteggio Finale: 0</p>
      <button onclick="location.reload()" class="action-btn">GIOCA ANCORA</button>
    </div>

    <div id="ui">
      <div class="dpad">
        <div></div><button class="btn" id="btn-up">↑</button><div></div>
        <button class="btn" id="btn-left">←</button>
        <button class="btn" id="btn-down">↓</button>
        <button class="btn" id="btn-right">→</button>
      </div>
      <button class="btn" id="btn-jump" style="width: 80px; height: 80px;">JUMP</button>
    </div>

    <div id="scene-container"></div>

    <script>
      const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
      const urlParams = new URLSearchParams(window.location.search);
      let mode = urlParams.get('mode'); 

      if (!mode) {
        mode = isMobile ? 'ar' : '2d';
        window.location.replace('?mode=' + mode);
      }

      const btnSwitch = document.getElementById('btn-switch-mode');
      const ui = document.getElementById('ui');
      const pcInst = document.getElementById('pc-instructions');

      if (isMobile) {
        btnSwitch.style.display = 'block'; 
        if (mode === 'ar') {
          btnSwitch.innerText = 'Gioca in 2D';
          btnSwitch.onclick = () => window.location.href = '?mode=2d';
        } else {
          btnSwitch.innerText = 'Torna in AR';
          btnSwitch.onclick = () => window.location.href = '?mode=ar';
        }
      }

      if (mode === '2d' && !isMobile) {
         ui.style.display = 'none'; 
         pcInst.style.display = 'block'; 
      }

      document.getElementById('btn-restart').addEventListener('click', () => {
        const gameWorld = document.getElementById('game-world');
        if (gameWorld && gameWorld.components['donkey-kong-logic']) {
            gameWorld.components['donkey-kong-logic'].resetGame();
        }
      });

      document.getElementById('btn-start').addEventListener('click', () => {
        document.getElementById('start-screen').style.display = 'none';
        const gameWorld = document.getElementById('game-world');
        if (gameWorld && gameWorld.components['donkey-kong-logic']) {
            gameWorld.components['donkey-kong-logic'].gameActive = true;
        }
      });

      const assetsHTML = `
        <a-assets>
          <img id="player1" src="assets/player (1).png">
          <img id="player2" src="assets/player (2).png">
          <img id="player3" src="assets/player (3).png">
          <img id="player4" src="assets/player (4).png">
          <img id="orangeImg" src="assets/orange.png">
          <img id="spiritello001" src="assets/spiritello001.png">
          <img id="spiritello002" src="assets/spiritello002.png">
          <img id="spiritello003" src="assets/spiritello003.png">
          <img id="scaleImg" src="assets/scale.png">
          <img id="bottleImg" src="assets/bottiglia.png"> 
        </a-assets>
      `;

      // BOTTIGLIA SISTEMATA (width="0.08" height="0.16") E ABBASSATA
      const gameWorldHTML = `
        <a-entity id="game-world" donkey-kong-logic scale="1.5 1.5 1.5">
          <a-box class="platform" position="0 -0.8 0" rotation="0 0 4" width="1.2" height="0.05" depth="0.1" color="#e60000"></a-box>
          <a-plane class="ladder" material="src: #scaleImg; transparent: true; repeat: 1 3" position="0.4 -0.54 -0.06" width="0.15" height="0.48"></a-plane>
          
          <a-box class="platform" position="0 -0.3 0" rotation="0 0 -4" width="1.0" height="0.05" depth="0.1" color="#e60000"></a-box>
          <a-plane class="ladder" material="src: #scaleImg; transparent: true; repeat: 1 3" position="-0.3 -0.05 -0.06" width="0.15" height="0.48"></a-plane>

          <a-box class="platform" position="0 0.2 0" rotation="0 0 4" width="1.0" height="0.05" depth="0.1" color="#e60000"></a-box>
          <a-plane class="ladder" material="src: #scaleImg; transparent: true; repeat: 1 3" position="0.3 0.46 -0.06" width="0.15" height="0.48"></a-plane>

          <a-box class="platform" position="-0.1 0.7 0" width="0.8" height="0.05" depth="0.1" color="#e60000"></a-box>

          <a-image id="player" src="#player1" position="-0.4 -0.6 0.1" width="0.25" height="0.25"></a-image>
          
          <a-image id="boss" src="#spiritello001" position="-0.4 0.85 0.1" width="0.3" height="0.3"></a-image>
          
          <a-image id="bottle" src="#bottleImg" position="-0.1 0.80 0.1" width="0.08" height="0.16"></a-image>
        </a-entity>
      `;

      function injectScene() {
        const container = document.getElementById('scene-container');
        if (mode === 'ar') {
          container.innerHTML = `
            <a-scene mindar-image="imageTargetSrc: ./campari-target.mind; filterMinCF:0.0001; filterBeta: 0.1; warmupTolerance: 5; missTolerance: 5" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
              ${assetsHTML}
              <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
              <a-entity mindar-image-target="targetIndex: 0">
                ${gameWorldHTML}
              </a-entity>
            </a-scene>
          `;
        } else {
          container.innerHTML = `
            <a-scene vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false" background="color: #222">
              ${assetsHTML}
              <a-camera position="0 0.1 2.2" look-controls="enabled: false" wasd-controls="enabled: false"></a-camera>
              ${gameWorldHTML}
            </a-scene>
          `;
        }
      }

      if (mode === 'ar') {
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js';
        script.onload = () => injectScene();
        document.head.appendChild(script);
      } else {
        injectScene();
      }
    </script>
  </body>
</html>
